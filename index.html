<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Web</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="Resumen"></div>
  <div id="Cauciones"></div>
  <div id="Descuento de Cheques"></div>
  <div id="Lecap / Boncap"></div>
  <div id="Bonos Soberanos"></div>
  <div id="Arbitraje"></div>
  

  <script>
    async function loadComponent(id, file) {
      const response = await fetch(file);
      const content = await response.text();
      document.getElementById(id).innerHTML = content;
    }

    loadComponent("Resumen", "Rensumen.html");
    loadComponent("Cauciones", "Cauciones.html");
    loadComponent("Decuento de Cheques", "Descuento.html");
    loadComponent("Lecap / Boncap", "Lecap.html");
    loadComponent("Bonos Soberanos", "Bonos.html");
    loadComponent("Arbitraje", "Arbitraje.html");
    
  </script>
</body>
</html>
